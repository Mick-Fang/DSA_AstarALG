<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Pathfinding Visualization</title>
    <meta name="description" content="A visually stunning A* Pathfinding Algorithm Visualization tool.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>A* Pathfinding Visualizer</h1>
        <p>Witness the algorithm in action</p>
    </header>
    
    <main>
        <div class="controls">
            <button id="btn-generate">Generate Random Map</button>
            <button id="btn-start" class="primary">Start Search</button>
            <button id="btn-clear">Clear Map</button>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="node start"></div> Start Node</div>
            <div class="legend-item"><div class="node end"></div> Target Node</div>
            <div class="legend-item"><div class="node obstacle"></div> Obstacle</div>
            <div class="legend-item"><div class="node visited"></div> Visited</div>
            <div class="legend-item"><div class="node enqueue"></div> In Queue</div>
            <div class="legend-item"><div class="node path"></div> Shortest Path</div>
        </div>

        <div class="grid-wrapper" style="position: relative; display: inline-block;">
            <canvas id="overlay-canvas" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10;"></canvas>
            <div class="grid-container" id="grid-container">
                <!-- Grid will be generated by JS -->
            </div>
        </div>
    </main>

    <script src="AStarLogic.js"></script>
    <script src="index.js"></script>
</body>
</html>
